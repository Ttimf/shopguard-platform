# Продовый оверлей. Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d
#
# Наружу торчит только Caddy (80/443). Внутренние сервисы host-порты не публикуют.

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      FILES_DOMAIN: ${FILES_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [gateway, minio]

  # presigned-ссылки должны указывать на публичный домен файлов
  gateway:
    ports: !reset null
    environment:
      S3_PUBLIC_ENDPOINT: https://${FILES_DOMAIN}

  # host-порты внутренних сервисов закрыты — доступ только по внутренней сети
  postgres:
    ports: !reset null
  redis:
    ports: !reset null
  minio:
    ports: !reset null
  auth:
    ports: !reset null
  user:
    ports: !reset null
  camera:
    ports: !reset null
  notification:
    ports: !reset null
  storage:
    ports: !reset null
  event:
    ports: !reset null
  worker:
    ports: !reset null
  ai-detection:
    ports: !reset null

volumes:
  caddy_data:
  caddy_config:
